<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="320" height="320" style="overflow: visible;" id="pulse-buddy-dragging-loop">
    <style>
        /* === CSS VARIABLES and BASE === */
        .stroke-main { stroke: #253549; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
        .fill-base { fill: #F0EDE6; }
        .fill-accent-sky { fill: #38BDF8; }
        .fill-accent-amber { fill: #FFB830; }
        .fill-dark { fill: #253549; }

        /* =========================================
           ANIMATIONS FOR DRAGGING LOOP (600ms Seamless)
           ========================================= */
        #pulse-buddy-wrapper {
            /* Lắc lư hình chữ U: đung đưa và nhấp nhô lướt đi */
            animation: dangle-swing 0.6s ease-in-out infinite;
            transform-origin: 100px 60px; /* Tâm xoay ở đỉnh đầu tạo cảm giác bị "túm" treo lên */
        }
        #shadow {
            /* Bóng giữ ở kích thước nhỏ gọn và trượt nhẹ theo hướng lắc */
            animation: shadow-glide 0.6s ease-in-out infinite;
            transform-origin: 100px 180px;
        }
        #leftArm {
            /* Tay đập nhẹ giữ thăng bằng */
            animation: arm-flap-left 0.6s ease-in-out infinite;
            transform-origin: 52px 120px;
        }
        #rightArm {
            /* Tay đập nhẹ giữ thăng bằng */
            animation: arm-flap-right 0.6s ease-in-out infinite;
            transform-origin: 148px 120px;
        }
        .pupil-group {
            /* Mắt liếc qua lại theo hướng đung đưa */
            animation: eyes-dart 0.6s ease-in-out infinite;
        }
        #heartCore {
            /* Tim đập nhanh do lơ lửng */
            animation: heart-flutter-loop 0.6s ease-in-out infinite;
            transform-origin: 100px 136px;
        }

        /* =========================================
           KEYFRAMES
           ========================================= */
        @keyframes dangle-swing {
            0% { transform: translateY(-12px) rotate(-4deg); } /* Nghiêng trái, nhấc cao */
            25% { transform: translateY(-8px) rotate(0deg); }  /* Lướt ở giữa, hơi chúi xuống */
            50% { transform: translateY(-12px) rotate(4deg); } /* Nghiêng phải, nhấc cao */
            75% { transform: translateY(-8px) rotate(0deg); }  /* Lướt ở giữa, hơi chúi xuống */
            100% { transform: translateY(-12px) rotate(-4deg); }
        }
        @keyframes shadow-glide {
            0% { transform: scale(0.65) translateX(6px); opacity: 0.08; } /* Bóng lệch phải khi người nghiêng trái */
            25% { transform: scale(0.7) translateX(0px); opacity: 0.1; }
            50% { transform: scale(0.65) translateX(-6px); opacity: 0.08; } /* Bóng lệch trái khi người nghiêng phải */
            75% { transform: scale(0.7) translateX(0px); opacity: 0.1; }
            100% { transform: scale(0.65) translateX(6px); opacity: 0.08; }
        }
        @keyframes arm-flap-left {
            0%, 100% { transform: rotate(40deg) translateX(-2px); }
            50% { transform: rotate(20deg) translateX(0px); }
        }
        @keyframes arm-flap-right {
            0%, 100% { transform: rotate(-20deg) translateX(0px); }
            50% { transform: rotate(-40deg) translateX(2px); }
        }
        @keyframes eyes-dart {
            0%, 100% { transform: translateX(-4px) scale(1.1); } /* Liếc trái */
            25% { transform: translateX(0px) scale(1.15); }
            50% { transform: translateX(4px) scale(1.1); } /* Liếc phải */
            75% { transform: translateX(0px) scale(1.15); }
        }
        @keyframes heart-flutter-loop {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
    </style>

    <!-- BÓNG ĐỔ DƯỚI ĐẤT (Nhỏ lại do đang bay) -->
    <g id="shadow">
        <ellipse cx="100" cy="180" rx="45" ry="8" fill="#253549" />
    </g>

    <!-- WRAPPER CHÍNH (Đung đưa theo đường cong chữ U) -->
    <g id="pulse-buddy-wrapper">

        <!-- LEFT ARM -->
        <g id="leftArm">
            <path class="stroke-main fill-base" d="M 52 120 C 30 115, 20 130, 32 145 C 38 152, 48 145, 50 135" />
        </g>

        <!-- RIGHT ARM -->
        <g id="rightArm">
            <path class="stroke-main fill-base" d="M 148 120 C 170 115, 180 130, 168 145 C 162 152, 152 145, 150 135" />
        </g>

        <!-- THÂN CHÍNH (BODY) -->
        <g id="body">
            <!-- Thân hình giữ trạng thái hơi giãn dài (stretch) vì bị nhấc lên -->
            <path class="stroke-main fill-base" d="M 100 35 C 140 35, 155 80, 155 135 C 155 162, 135 172, 100 172 C 65 172, 45 162, 45 135 C 45 80, 60 35, 100 35 Z" />
        </g>

        <!-- TRÁI TIM Ở NGỰC (HEART CORE) -->
        <g id="heartCore">
            <path class="fill-accent-sky" d="M 100 146 C 100 146, 86 136, 86 128 C 86 122, 91 118, 97 118 C 100 118, 100 121, 100 121 C 100 121, 100 118, 103 118 C 109 118, 114 122, 114 128 C 114 136, 100 146, 100 146 Z" />
            <path class="stroke-main" fill="none" d="M 100 146 C 100 146, 86 136, 86 128 C 86 122, 91 118, 97 118 C 100 118, 100 121, 100 121 C 100 121, 100 118, 103 118 C 109 118, 114 122, 114 128 C 114 136, 100 146, 100 146 Z" />
        </g>

        <!-- KHUÔN MẶT (FACE) -->
        <g id="face">
            
            <!-- Má hồng -->
            <g id="blush">
                <ellipse cx="68" cy="104" rx="7" ry="3.5" class="fill-accent-amber" opacity="0.6" />
                <ellipse cx="132" cy="104" rx="7" ry="3.5" class="fill-accent-amber" opacity="0.6" />
            </g>

            <!-- Kính Nerd -->
            <g id="glasses">
                <path class="stroke-main" fill="none" d="M 92 88 Q 100 84 108 88" stroke-width="4" />
                <circle cx="76" cy="90" r="16" class="stroke-main" fill="none" stroke-width="4.5" />
                <circle cx="124" cy="90" r="16" class="stroke-main" fill="none" stroke-width="4.5" />
            </g>

            <!-- MẮT (EYES) - Liếc liên tục để tìm đường -->
            <g id="eyes">
                <g class="pupil-group">
                    <circle cx="76" cy="90" r="5" class="fill-dark" />
                    <circle cx="74" cy="88" r="1.5" fill="#ffffff" />
                </g>
                <g class="pupil-group">
                    <circle cx="124" cy="90" r="5" class="fill-dark" />
                    <circle cx="122" cy="88" r="1.5" fill="#ffffff" />
                </g>
            </g>

            <!-- MIỆNG (MOUTH) - Chữ O ngạc nhiên pha tập trung -->
            <g id="mouth">
                <ellipse cx="100" cy="106" rx="3.5" ry="4.5" class="fill-dark" />
            </g>
            
        </g>
    </g>
</svg>