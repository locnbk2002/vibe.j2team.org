<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="320" height="320" style="overflow: visible;" id="pulse-buddy-drag-start">
    <style>
        /* === CSS VARIABLES and BASE === */
        .stroke-main { stroke: #253549; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
        .fill-base { fill: #F0EDE6; }
        .fill-accent-sky { fill: #38BDF8; }
        .fill-accent-amber { fill: #FFB830; }
        .fill-dark { fill: #253549; }

        /* =========================================
           ANIMATIONS FOR DRAG START (300ms One-shot)
           ========================================= */
        #pulse-buddy-wrapper {
            /* Cú lún người (squash) và nhấc bổng (stretch) mượt mà */
            animation: drag-squash 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transform-origin: 100px 172px; 
        }
        #shadow {
            /* Bóng mờ và nhỏ lại do nhân vật bị nhấc lên cao */
            animation: drag-shadow 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transform-origin: 100px 180px;
        }
        #leftArm {
            animation: arm-flare-left 0.3s ease-out forwards;
            transform-origin: 52px 120px; /* Xoay từ khớp vai */
        }
        #rightArm {
            animation: arm-flare-right 0.3s ease-out forwards;
            transform-origin: 148px 120px;
        }
        .pupil-group {
            animation: eyes-wide 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        #heartCore {
            animation: heart-flutter 0.3s ease-in-out forwards;
            transform-origin: 100px 136px;
        }

        /* =========================================
           KEYFRAMES
           ========================================= */
        @keyframes drag-squash {
            0% { transform: scaleY(1) scaleX(1) translateY(0); }
            50% { transform: scaleY(0.85) scaleX(1.05) translateY(12px); } /* Nhún xuống lấy đà */
            100% { transform: scaleY(1.05) scaleX(0.95) translateY(-8px); } /* Bị nhấc bổng (căng người) */
        }
        @keyframes drag-shadow {
            0% { transform: scale(1); opacity: 0.15; }
            50% { transform: scale(1.1); opacity: 0.2; }
            100% { transform: scale(0.7); opacity: 0.08; } /* Bóng teo nhỏ khi xa mặt đất */
        }
        @keyframes arm-flare-left {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(35deg) translateX(-2px); } /* Dang tay trái */
        }
        @keyframes arm-flare-right {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-35deg) translateX(2px); } /* Dang tay phải */
        }
        @keyframes eyes-wide {
            0% { transform: scale(1); }
            100% { transform: scale(1.35); } /* Mở to đồng tử */
        }
        @keyframes heart-flutter {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>

    <!-- BÓNG ĐỔ DƯỚI ĐẤT -->
    <g id="shadow">
        <ellipse cx="100" cy="180" rx="45" ry="8" fill="#253549" />
    </g>

    <!-- WRAPPER CHÍNH CHO CHUYỂN ĐỘNG NHẤC BỔNG -->
    <g id="pulse-buddy-wrapper">

        <!-- LEFT ARM -->
        <g id="leftArm">
            <path class="stroke-main fill-base" d="M 52 120 C 30 115, 20 130, 32 145 C 38 152, 48 145, 50 135" />
        </g>

        <!-- RIGHT ARM -->
        <g id="rightArm">
            <path class="stroke-main fill-base" d="M 148 120 C 170 115, 180 130, 168 145 C 162 152, 152 145, 150 135" />
        </g>

        <!-- THÂN CHÍNH (BODY) -->
        <g id="body">
            <path class="stroke-main fill-base" d="M 100 35 C 140 35, 155 80, 155 135 C 155 162, 135 172, 100 172 C 65 172, 45 162, 45 135 C 45 80, 60 35, 100 35 Z" />
        </g>

        <!-- TRÁI TIM Ở NGỰC (HEART CORE) -->
        <g id="heartCore">
            <path class="fill-accent-sky" d="M 100 146 C 100 146, 86 136, 86 128 C 86 122, 91 118, 97 118 C 100 118, 100 121, 100 121 C 100 121, 100 118, 103 118 C 109 118, 114 122, 114 128 C 114 136, 100 146, 100 146 Z" />
            <path class="stroke-main" fill="none" d="M 100 146 C 100 146, 86 136, 86 128 C 86 122, 91 118, 97 118 C 100 118, 100 121, 100 121 C 100 121, 100 118, 103 118 C 109 118, 114 122, 114 128 C 114 136, 100 146, 100 146 Z" />
        </g>

        <!-- KHUÔN MẶT (FACE) -->
        <g id="face">
            
            <!-- Má hồng -->
            <g id="blush">
                <ellipse cx="68" cy="104" rx="7" ry="3.5" class="fill-accent-amber" opacity="0.6" />
                <ellipse cx="132" cy="104" rx="7" ry="3.5" class="fill-accent-amber" opacity="0.6" />
            </g>

            <!-- Kính Nerd -->
            <g id="glasses">
                <path class="stroke-main" fill="none" d="M 92 88 Q 100 84 108 88" stroke-width="4" />
                <circle cx="76" cy="90" r="16" class="stroke-main" fill="none" stroke-width="4.5" />
                <circle cx="124" cy="90" r="16" class="stroke-main" fill="none" stroke-width="4.5" />
            </g>

            <!-- MẮT (EYES) - Chuyển sang Group để scale mượt -->
            <g id="eyes">
                <g class="pupil-group" style="transform-origin: 76px 90px;">
                    <circle cx="76" cy="90" r="5" class="fill-dark" />
                    <circle cx="74" cy="88" r="1.5" fill="#ffffff" />
                </g>
                <g class="pupil-group" style="transform-origin: 124px 90px;">
                    <circle cx="124" cy="90" r="5" class="fill-dark" />
                    <circle cx="122" cy="88" r="1.5" fill="#ffffff" />
                </g>
            </g>

            <!-- MIỆNG (MOUTH) - Chuyển thành nụ cười bất ngờ chữ O -->
            <g id="mouth">
                <ellipse cx="100" cy="106" rx="3.5" ry="4.5" class="fill-dark" />
            </g>
            
        </g>
    </g>
</svg>