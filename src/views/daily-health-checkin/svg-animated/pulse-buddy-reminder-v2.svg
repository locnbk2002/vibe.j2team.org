<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="320" height="320" style="overflow: visible;" id="pulse-buddy-reminder-v2">
    <style>
        /* === CSS VARIABLES and BASE === */
        .stroke-main { stroke: #253549; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
        .fill-base { fill: #F0EDE6; }
        .fill-accent-sky { fill: #38BDF8; }
        .fill-accent-amber { fill: #FFB830; }
        .fill-dark { fill: #253549; }

        /* =========================================
           ANIMATIONS FOR REMINDER V2 (Gentle Sway)
           ========================================= */
        #pulse-buddy-wrapper {
            /* Nghiêng trái phải ±3deg cực nhẹ nhàng */
            animation: gentle-sway 1.6s ease-in-out infinite;
            transform-origin: 100px 172px; 
        }
        #shadow {
            /* Bóng trượt nhẹ ngược chiều nghiêng */
            animation: sway-shadow 1.6s ease-in-out infinite;
            transform-origin: 100px 180px;
        }
        #heartCore {
            /* Tim đập nhanh hơn bình thường (1.1x) */
            animation: faster-heart 1.6s ease-in-out infinite;
            transform-origin: 100px 136px;
        }
        .pupil-group {
            /* Chớp mắt với nhịp độ lo lắng nhẹ (concerned) */
            animation: blink-concerned 4s infinite;
        }
        #exclamation-mark {
            /* Dấu chấm than bật lên 0.9s, lặp chậm mỗi 3s */
            animation: exclamation-pop 3s ease-in-out infinite;
            transform-origin: 140px 60px; /* Tâm nảy lên từ đầu */
        }

        /* =========================================
           KEYFRAMES
           ========================================= */
        @keyframes gentle-sway {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(3deg); }
            75% { transform: rotate(-3deg); }
        }
        
        @keyframes sway-shadow {
            0%, 100% { transform: scale(1) translateX(0); opacity: 0.15; }
            25% { transform: scale(0.95) translateX(-1.5px); opacity: 0.12; }
            75% { transform: scale(0.95) translateX(1.5px); opacity: 0.12; }
        }

        @keyframes faster-heart {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); } /* Scale to 1.1x */
        }

        @keyframes blink-concerned {
            /* Đồng tử nhích nhẹ lên trên, chớp mắt kép */
            0%, 45%, 49%, 100% { transform: translateY(-1.5px) scale(0.9); }
            46%, 48% { transform: translateY(-1.5px) scale(0.9) scaleY(0.1); }
        }

        @keyframes exclamation-pop {
            /* Thời gian active là 30% của 3s = 0.9s */
            0% { transform: scale(0) translateY(10px); opacity: 0; }
            10% { transform: scale(1.2) translateY(-4px); opacity: 1; } /* Bật nảy lên */
            15% { transform: scale(1) translateY(0); opacity: 1; }     /* Cân bằng */
            25% { transform: scale(1) translateY(0); opacity: 1; }     /* Giữ lơ lửng */
            30% { transform: scale(0) translateY(8px); opacity: 0; }   /* Rơi và tan biến */
            100% { transform: scale(0) translateY(8px); opacity: 0; }  /* Nghỉ 2.1s */
        }
    </style>

    <!-- BÓNG ĐỔ DƯỚI ĐẤT -->
    <g id="shadow">
        <ellipse cx="100" cy="180" rx="45" ry="8" fill="#253549" />
    </g>

    <!-- WRAPPER CHÍNH (Gentle Sway) -->
    <g id="pulse-buddy-wrapper">

        <!-- LEFT ARM -->
        <g id="leftArm">
            <!-- Tay rủ nhẹ hơn lúc idle -->
            <path class="stroke-main fill-base" d="M 52 120 C 30 115, 20 135, 32 148 C 38 155, 48 147, 50 137" />
        </g>

        <!-- RIGHT ARM -->
        <g id="rightArm">
            <!-- Tay rủ nhẹ hơn lúc idle -->
            <path class="stroke-main fill-base" d="M 148 120 C 170 115, 180 135, 168 148 C 162 155, 152 147, 150 137" />
        </g>

        <!-- THÂN CHÍNH (BODY) -->
        <g id="body">
            <path class="stroke-main fill-base" d="M 100 35 C 140 35, 155 80, 155 135 C 155 162, 135 172, 100 172 C 65 172, 45 162, 45 135 C 45 80, 60 35, 100 35 Z" />
        </g>

        <!-- TRÁI TIM Ở NGỰC (HEART CORE - AMBER) -->
        <g id="heartCore">
            <!-- Đổi màu tim sang Accent Amber để hợp trạng thái nhắc nhở -->
            <path class="fill-accent-amber" d="M 100 146 C 100 146, 86 136, 86 128 C 86 122, 91 118, 97 118 C 100 118, 100 121, 100 121 C 100 121, 100 118, 103 118 C 109 118, 114 122, 114 128 C 114 136, 100 146, 100 146 Z" />
            <path class="stroke-main" fill="none" d="M 100 146 C 100 146, 86 136, 86 128 C 86 122, 91 118, 97 118 C 100 118, 100 121, 100 121 C 100 121, 100 118, 103 118 C 109 118, 114 122, 114 128 C 114 136, 100 146, 100 146 Z" />
        </g>

        <!-- KHUÔN MẶT (FACE) -->
        <g id="face">
            
            <!-- Má hồng -->
            <g id="blush">
                <ellipse cx="68" cy="104" rx="7" ry="3.5" class="fill-accent-amber" opacity="0.6" />
                <ellipse cx="132" cy="104" rx="7" ry="3.5" class="fill-accent-amber" opacity="0.6" />
            </g>

            <!-- Kính Nerd -->
            <g id="glasses">
                <path class="stroke-main" fill="none" d="M 92 88 Q 100 84 108 88" stroke-width="4" />
                <circle cx="76" cy="90" r="16" class="stroke-main" fill="none" stroke-width="4.5" />
                <circle cx="124" cy="90" r="16" class="stroke-main" fill="none" stroke-width="4.5" />
            </g>

            <!-- MẮT (EYES) - Concerned -->
            <g id="eyes">
                <g class="pupil-group" style="transform-origin: 76px 88px;">
                    <circle cx="76" cy="88" r="5" class="fill-dark" />
                    <circle cx="74" cy="86" r="1.5" fill="#ffffff" />
                </g>
                <g class="pupil-group" style="transform-origin: 124px 88px;">
                    <circle cx="124" cy="88" r="5" class="fill-dark" />
                    <circle cx="122" cy="86" r="1.5" fill="#ffffff" />
                </g>
            </g>

            <!-- MIỆNG (MOUTH) - Frown nhẹ -->
            <g id="mouth">
                <!-- Đường cong úp xuống tạo vẻ băn khoăn đáng yêu -->
                <path class="stroke-main" fill="none" d="M 93 105 Q 100 100 107 105" stroke-width="4" />
            </g>
            
        </g>
        
        <!-- ICON DẤU CHẤM THAN (!) -->
        <g id="exclamation-mark" transform="translate(135, 45)">
            <!-- Nét dài phía trên -->
            <path d="M 0 0 L 0 14" class="stroke-main" stroke-width="6" stroke-linecap="round" fill="none" />
            <path d="M 0 0 L 0 14" stroke="#FFB830" stroke-width="4" stroke-linecap="round" fill="none" />
            <!-- Chấm tròn phía dưới -->
            <circle cx="0" cy="24" r="3.5" class="fill-dark" />
            <circle cx="0" cy="24" r="2" fill="#FFB830" />
        </g>

    </g>
</svg>